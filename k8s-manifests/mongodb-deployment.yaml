apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: k8s-chatapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        name:  mongodb-pod  
        namespace: k8s-chatapp  
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        env:
          - name:  MONGO_INITDB_ROOT_USERNAME
            value: "swapnil"
          - name:  MONGO_INITDB_ROOT_PASSWORD
            value: "swapnil123"
        volumeMounts:
          - name:  mongodb-storage
            mountPath:  /data/db
      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc
